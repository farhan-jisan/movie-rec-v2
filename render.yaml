# ---------------------------------------------------------------------------
# Movie Recommender v2 — Render Blueprint
# ---------------------------------------------------------------------------
# Single free-tier Web Service.  Render auto-detects the Dockerfile in
# `backend/` and builds the image, which already has artifacts + SBERT
# baked in (see backend/Dockerfile).  No persistent disk is needed:
# everything is loaded into memory at startup.
# ---------------------------------------------------------------------------

services:
  - type: web
    name: mr-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/healthz

    envVars:
      - key: TMDB_API_KEY
        sync: false                     # supplied via Render dashboard secret
      - key: ALLOWED_ORIGINS
        # Comma-separated list of explicit origins. We do NOT use "*"
        # because `allow_credentials=True` + wildcard is rejected by
        # browsers (CORS spec). Add localhost as a second entry when
        # you need to develop against the local Vite dev server.
        value: "https://movie-rec-v2-dg6okjrhj-farhan-jisaaan.vercel.app"
      - key: ARTIFACTS_DIR
        value: ""
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONHASHSEED
        value: "random"

    autoDeploy: true